<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DRAKSYON ANIMES - Assista Animes Online</title>
    <meta name="description" content="Assista animes online legendados e dublados. A melhor plataforma de streaming de anime." />
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        html,body{height:100%}
        body{
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
            background:#0d0d0f;
            color:#fff;
            -webkit-font-smoothing:antialiased;
            overflow-y:auto;
            padding-top:65px;
        }
        ::-webkit-scrollbar{width:5px;height:6px}
        ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:999px}
        ::-webkit-scrollbar-track{background:transparent}

        .otk-header-fixed{
            position:fixed;top:0;left:0;right:0;height:65px;
            display:flex;align-items:center;justify-content:space-between;
            padding:0 18px;
            background:rgba(13,13,15,0.85);
            backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
            border-bottom:1px solid rgba(255,255,255,0.04);
            z-index:100;
        }
        .header-inner{
            width:100%;max-width:1200px;margin:0 auto;
            display:flex;align-items:center;justify-content:space-between;
        }
        .header-title{font-size:18px;font-weight:700;color:#fff;letter-spacing:1px;text-align:center;flex:1}
        .header-right{display:flex;align-items:center;gap:8px}
        .icon-btn{background:transparent;border:none;color:#fff;cursor:pointer;padding:6px;display:flex;align-items:center;justify-content:center;transition:opacity .3s}
        .icon-btn:hover{opacity:.7}

        .drawer-overlay{
            position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:150;
            opacity:0;visibility:hidden;transition:opacity .35s,visibility .35s;
            backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
        }
        .drawer-overlay.open{opacity:1;visibility:visible}
        .drawer{
            position:fixed;top:0;left:0;bottom:0;width:270px;max-width:80vw;
            background:#111113;z-index:200;
            transform:translateX(-100%);
            transition:transform .35s cubic-bezier(.4,0,.2,1);
            display:flex;flex-direction:column;
            border-right:1px solid rgba(255,255,255,0.06);
            overflow-y:auto;
        }
        .drawer.open{transform:translateX(0)}
        .drawer-top{
            padding:20px 16px 14px;
            display:flex;align-items:center;justify-content:space-between;
            border-bottom:1px solid rgba(255,255,255,0.06);
        }
        .drawer-brand-row{display:flex;align-items:center;gap:10px}
        .drawer-brand-logo{
            width:34px;height:34px;border-radius:8px;
            background:linear-gradient(135deg,#254BFF,#3A56F6);
            display:flex;align-items:center;justify-content:center;
            box-shadow:0 3px 10px rgba(37,75,255,0.3);overflow:hidden;
        }
        .drawer-brand-logo img{width:100%;height:100%;object-fit:cover;border-radius:8px}
        .drawer-brand-title{font-size:15px;font-weight:700;color:#fff;letter-spacing:.5px}
        .drawer-close-btn{
            background:none;border:none;color:#666;
            width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:color .2s;
        }
        .drawer-close-btn:hover{color:#fff}
        .drawer-nav{list-style:none;padding:8px 8px 0}
        .drawer-nav-item{
            display:flex;align-items:center;gap:12px;
            padding:11px 12px;border-radius:8px;cursor:pointer;
            color:#888;font-size:14px;font-weight:500;
            transition:all .2s;border:none;background:none;width:100%;text-align:left;
        }
        .drawer-nav-item:hover{background:rgba(255,255,255,0.04);color:#ccc}
        .drawer-nav-item.active{background:rgba(37,75,255,0.12);color:#fff}
        .drawer-nav-item svg{width:18px;height:18px;flex-shrink:0;opacity:.6}
        .drawer-nav-item.active svg{opacity:1;color:#5B7FFF}
        li + li .drawer-nav-item{margin-top:1px}
        .drawer-divider{height:1px;background:rgba(255,255,255,0.05);margin:6px 16px}
        .drawer-section-label{padding:10px 16px 4px;font-size:11px;font-weight:700;color:#555;letter-spacing:1px;text-transform:uppercase}
        .server-option{
            display:flex;align-items:center;gap:12px;
            padding:10px 12px;border-radius:8px;cursor:pointer;
            color:#888;font-size:13px;font-weight:500;
            transition:all .2s;border:none;background:none;width:100%;text-align:left;
        }
        .server-option:hover{background:rgba(255,255,255,0.04);color:#ccc}
        .server-option.active{background:rgba(37,75,255,0.12);color:#fff}
        .server-radio{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color .2s}
        .server-option.active .server-radio{border-color:#254BFF}
        .server-radio-dot{width:8px;height:8px;border-radius:50%;background:#254BFF;display:none}
        .server-option.active .server-radio-dot{display:block}
        .server-name{flex:1}
        .server-badge{font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(37,75,255,0.15);color:#5B7FFF;font-weight:600}
        .drawer-footer{margin-top:auto;padding:14px 16px;border-top:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;gap:10px}
        .drawer-avatar{width:35px;height:35px;border-radius:50%;background:#1a1a1e;background-size:cover;background-position:center;flex-shrink:0}
        .drawer-user-info{display:flex;flex-direction:column;gap:1px;flex:1}
        .drawer-user-name{font-size:14px;font-weight:600;color:#ddd}
        .drawer-user-role{font-size:11px;color:#555}

        .search-box{position:fixed;top:65px;left:0;right:0;z-index:90;padding:0 14px;display:none;
            background:rgba(13,13,15,0.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
            border-bottom:1px solid rgba(255,255,255,0.04);
        }
        .search-box.show{display:block}
        .search-box-inner{position:relative;max-width:720px;margin:0 auto;padding:10px 0}
        .search-input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);padding:11px 14px 11px 40px;border-radius:10px;color:#fff;font-size:15px;outline:none;transition:border-color .2s}
        .search-input:focus{border-color:rgba(37,75,255,0.4)}
        .search-box-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#555;pointer-events:none}
        .server-indicator{font-size:10px;color:#5B7FFF;font-weight:700;padding:3px 8px;border-radius:6px;background:rgba(37,75,255,0.1);border:1px solid rgba(37,75,255,0.2);white-space:nowrap}

        .hero-section{position:relative;height:380px;overflow:hidden}
        .hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(6px) saturate(1.05);opacity:.35;transform:scale(1.05)}
        .hero-content{position:relative;height:100%;display:flex;align-items:flex-end;padding:18px;background:linear-gradient(180deg,rgba(0,0,0,0.6),rgba(13,13,15,1))}
        .featured-area{display:flex;gap:16px;align-items:flex-end;width:100%;max-width:1100px;margin:0 auto}
        .featured-poster{width:120px;height:180px;border-radius:12px;box-shadow:0 25px 50px -18px rgba(0,0,0,0.8);background-size:cover;background-position:center;flex-shrink:0;border:2px solid rgba(255,255,255,0.04)}
        .featured-info{flex:1;display:flex;flex-direction:column;gap:10px;min-width:0}
        .featured-title{font-size:18px;font-weight:300;font-style:italic;color:#fff;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .featured-actions{display:flex;gap:12px}
        .btn-outline,.btn-primary{border-radius:12px;padding:10px 14px;display:inline-flex;gap:8px;align-items:center;justify-content:center;cursor:pointer;font-weight:600;font-size:14px;border:0;flex:1;transition:all .3s}
        .btn-outline{background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.12)}
        .btn-outline:hover{background:rgba(255,255,255,0.05)}
        .btn-primary{background:linear-gradient(90deg,#254BFF,#3A56F6);color:#fff;box-shadow:0 8px 20px rgba(37,75,255,0.25)}
        .btn-primary:hover{box-shadow:0 12px 28px rgba(37,75,255,0.4)}

        .main-content{padding:18px 18px 40px;max-width:1200px;margin:0 auto}
        .anime-section{margin-bottom:28px}
        .section-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
        .section-bar{width:4px;height:26px;background:#254BFF;border-radius:6px}
        .section-title{font-size:18px;color:#fff;font-weight:400}

        .scraper-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px}
        .scraper-scroll::-webkit-scrollbar{height:8px}
        .scraper-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:999px}
        .scraper-scroll::-webkit-scrollbar-track{background:transparent}
        .scraper-card-mini{flex-shrink:0;width:128px;cursor:pointer;transition:transform .3s}
        .scraper-card-mini:hover{transform:scale(1.05)}
        .scraper-card-mini img{width:128px;height:192px;border-radius:12px;object-fit:cover;border:2px solid rgba(255,255,255,0.03);display:block}
        .scraper-card-mini .card-title{margin-top:8px;font-size:12px;color:#9aa0a6;line-height:1.2;height:36px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

        .scraper-list{padding:0}
        .premium-card{
            background:rgba(255,255,255,0.02);border-radius:16px;padding:12px;
            border:1px solid rgba(255,255,255,0.05);margin-bottom:15px;
            display:flex;gap:15px;text-decoration:none;color:#fff;
            box-shadow:0 8px 32px rgba(0,0,0,0.4);transition:border-color .3s,background .3s;cursor:pointer;
        }
        .premium-card:hover{border-color:rgba(37,75,255,0.2);background:rgba(255,255,255,0.04)}
        .premium-card .poster-container{width:100px;height:140px;border-radius:10px;overflow:hidden;flex-shrink:0}
        .premium-card .poster-container img{width:100%;height:100%;object-fit:cover}
        .premium-card .details{flex:1;display:flex;flex-direction:column;justify-content:center}
        .premium-card .tag-status{font-size:11px;color:#9aa0a6;margin-bottom:5px;letter-spacing:.5px}
        .premium-card .title-anime{font-size:16px;font-weight:800;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .btn-assistir{background:linear-gradient(90deg,#254BFF,#3A56F6);color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:14px;font-weight:700;width:fit-content;display:flex;align-items:center;gap:7px;cursor:pointer;box-shadow:0 4px 12px rgba(37,75,255,0.3);transition:box-shadow .3s}
        .btn-assistir:hover{box-shadow:0 6px 20px rgba(37,75,255,0.5)}

        .premium-pagination{display:flex;justify-content:center;align-items:center;gap:15px;margin:25px 0}
        .circ-btn{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);color:white;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s}
        .circ-btn:hover:not(:disabled){border-color:rgba(37,75,255,0.4);background:rgba(37,75,255,0.08)}
        .circ-btn:disabled{opacity:.3;cursor:not-allowed}
        .circ-btn svg{width:20px;height:20px}
        .page-display{font-weight:700;color:#254BFF;font-size:16px}

        .cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px}
        .cat-chip{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:15px 12px;cursor:pointer;text-align:center;transition:all .25s;display:flex;align-items:center;justify-content:center}
        .cat-chip:hover{border-color:rgba(37,75,255,0.3);background:rgba(37,75,255,0.06)}
        .cat-chip.active{background:rgba(37,75,255,0.12);border-color:rgba(37,75,255,0.35)}
        .cat-chip-name{font-size:13px;color:#9aa0a6;font-weight:600;transition:color .2s}
        .cat-chip:hover .cat-chip-name{color:#ccc}
        .cat-chip.active .cat-chip-name{color:#fff}
        .cat-back-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:#fff;padding:10px 20px;border-radius:10px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;margin-bottom:18px;transition:.2s}
        .cat-back-btn:hover{background:rgba(37,75,255,0.1);border-color:rgba(37,75,255,0.3)}

        .loading,.no-results{min-height:320px;display:flex;align-items:center;justify-content:center;color:#9aa0a6;font-size:16px}
        .profile-card{padding:20px;background:rgba(255,255,255,0.02);border-radius:12px}
        .profile-info{color:#9aa0a6;margin-bottom:10px}
        .profile-info strong{color:#fff}
        .hidden{display:none!important}

        @media(min-width:768px){
            .otk-header-fixed{padding:0 28px}
            .header-title{font-size:22px}
            .hero-section{height:480px}
            .hero-content{padding:28px}
            .featured-poster{width:160px;height:240px}
            .featured-title{font-size:24px}
            .featured-actions{max-width:360px}
            .premium-card .poster-container{width:120px;height:170px}
            .premium-card .title-anime{font-size:18px}
            .cat-grid{grid-template-columns:repeat(3,1fr);gap:12px}
            .main-content{padding:24px 28px 40px}
            .scraper-card-mini{width:150px}
            .scraper-card-mini img{width:150px;height:220px}
        }
        @media(min-width:1024px){
            .hero-section{height:520px}
            .hero-content{padding:40px}
            .featured-poster{width:180px;height:270px}
            .featured-title{font-size:28px}
            .featured-actions{max-width:400px}
            .main-content{padding:30px 40px 60px}
            .scraper-list{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
            .scraper-list .premium-card{margin-bottom:0}
            .cat-grid{grid-template-columns:repeat(4,1fr);gap:14px}
            .scraper-card-mini{width:160px}
            .scraper-card-mini img{width:160px;height:240px}
        }
        @media(min-width:1280px){
            .scraper-list{grid-template-columns:repeat(3,1fr)}
            .cat-grid{grid-template-columns:repeat(5,1fr)}
        }
        @media(max-width:380px){
            .featured-poster{width:100px;height:150px}
            .featured-title{font-size:15px}
            .hero-section{height:320px}
            .main-content{padding:14px 14px 40px}
            .scraper-card-mini{width:110px}
            .scraper-card-mini img{width:110px;height:165px}
        }

/* ── Welcome Screen ── */
.welcome-overlay{
    position:fixed;inset:0;z-index:9999;
    display:flex;flex-direction:column;
    background:#0a0a12;
    transition:opacity .5s ease;
}
.welcome-overlay.hiding{opacity:0;pointer-events:none}
.welcome-banner{
    flex:1;position:relative;overflow:hidden;min-height:0;
}
.welcome-banner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    filter: none; /* Remova o blur para dar nitidez */
    transform: scale(1.05); /* Um leve zoom ajuda a preencher melhor as bordas */
}

.welcome-banner::after {
    content: '';
    position: absolute;
    inset: 0;
    /* O gradiente só começa a escurecer de verdade do meio para baixo */
    background: linear-gradient(to bottom, transparent 50%, rgba(10, 10, 18, 0.8) 75%, #0a0a12 100%);
}

.welcome-bottom{
    position:relative;z-index:2;
    padding:0 24px 40px;
    text-align:center;
    background:#0a0a12;
}
.welcome-dots{display:flex;justify-content:center;gap:8px;margin-bottom:20px}
.welcome-dot{
    height:5px;border-radius:99px;
    transition:all .3s ease;
}
.welcome-dot.active{width:28px;background:#254BFF}
.welcome-dot.done{width:14px;background:rgba(37,75,255,0.4)}
.welcome-dot.pending{width:14px;background:rgba(255,255,255,0.1)}
.welcome-title{
    font-size:22px;font-weight:700;color:#fff;
    margin-bottom:8px;line-height:1.3;
}
.welcome-desc{
    font-size:14px;color:#888;line-height:1.6;
    margin-bottom:28px;max-width:360px;margin-left:auto;margin-right:auto;
}
.welcome-btn-primary{
    width:100%;max-width:320px;
    padding:14px 24px;border:none;border-radius:12px;
    background:linear-gradient(90deg,#254BFF,#3A56F6);
    color:#fff;font-size:15px;font-weight:700;
    cursor:pointer;
    box-shadow:0 8px 24px rgba(37,75,255,0.3);
    transition:box-shadow .3s,transform .1s;
}
.welcome-btn-primary:hover{box-shadow:0 12px 32px rgba(37,75,255,0.5)}
.welcome-btn-primary:active{transform:scale(0.98)}
.welcome-skip{
    display:inline-block;margin-top:14px;
    background:none;border:none;color:#555;font-size:13px;
    cursor:pointer;transition:color .2s;
}
.welcome-skip:hover{color:#aaa}
@keyframes welcomeFadeUp{
    from{opacity:0;transform:translateY(10px)}
    to{opacity:1;transform:translateY(0)}
}
.welcome-animate{animation:welcomeFadeUp .4s ease forwards}
    </style>
</head>
<body>

<!-- ── Welcome Screen (first visit only) ── -->
<div class="welcome-overlay" id="welcome-overlay">
    <div class="welcome-banner">
<img src="https://raw.githubusercontent.com/FamasNdn777/chat-app/refs/heads/main/1775615368486.png" alt="Anime Banner">

    </div>
    <div class="welcome-bottom" id="welcome-bottom">
        <div class="welcome-dots" id="welcome-dots"></div>
        <h2 class="welcome-title welcome-animate" id="welcome-title"></h2>
        <p class="welcome-desc welcome-animate" id="welcome-desc"></p>
        <button class="welcome-btn-primary welcome-animate" id="welcome-next"></button>
        <br>
        <button class="welcome-skip" id="welcome-skip">Pular</button>
    </div>
</div>

    <div class="drawer-overlay" id="drawer-overlay"></div>

    <nav class="drawer" id="drawer">
        <div class="drawer-top">
            <div class="drawer-brand-row">
                <div class="drawer-brand-logo">
                    <img src="https://i.pinimg.com/736x/0d/af/79/0daf79ba1549f23b9caf058155a4bd42.jpg" alt="Logo">
                </div>
                <span class="drawer-brand-title">DRAKSYON</span>
            </div>
            <button class="drawer-close-btn" id="drawer-close" aria-label="Fechar menu">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
        </div>
        <ul class="drawer-nav">
            <li><button class="drawer-nav-item active" data-tab="home">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 21v-8a1 1 0 00-1-1h-4a1 1 0 00-1 1v8"/><path d="M3 10a2 2 0 01.709-1.528l7-5.999a2 2 0 012.582 0l7 5.999A2 2 0 0121 10v9a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
                <span>Home</span>
            </button></li>
            <li><button class="drawer-nav-item" data-tab="dublados">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 010 14.14"/><path d="M15.54 8.46a5 5 0 010 7.07"/></svg>
                <span>Dublados</span>
            </button></li>
            <li><button class="drawer-nav-item" data-tab="legendados">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M7 15h4"/><path d="M15 15h2"/><path d="M7 11h2"/><path d="M13 11h4"/></svg>
                <span>Legendados</span>
            </button></li>
            <li><button class="drawer-nav-item" data-tab="lancamentos">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                <span>Lançamentos</span>
            </button></li>
            <li><button class="drawer-nav-item" data-tab="categoria">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                <span>Categorias</span>
            </button></li>
        </ul>
        <div class="drawer-divider"></div>
        <div class="drawer-section-label">Selecionar Servidor</div>
        <ul class="drawer-nav" id="server-list">
            <li><button class="server-option active" data-server="s1">
                <div class="server-radio"><div class="server-radio-dot"></div></div>
                <span class="server-name">AnimeFire</span>

    <script>
    var API_BASE = '';
    var LS_SERVER = 'draksyon_server_v1';

    var currentServer = localStorage.getItem(LS_SERVER) || 's1';

    function getApiPrefix() { return currentServer === 's2' ? '/api/s2' : '/api'; }
    function SCRAPER_URL() { return API_BASE + getApiPrefix() + '/dublados'; }
    function SCRAPER_LEGENDADOS_URL() { return API_BASE + getApiPrefix() + '/legendados'; }
    function SCRAPER_LANCAMENTOS_URL() { return API_BASE + getApiPrefix() + '/lancamentos'; }
    function SCRAPER_CATEGORIAS_URL() { return API_BASE + getApiPrefix() + '/categorias'; }
    function SCRAPER_GENERO_URL() { return API_BASE + getApiPrefix() + '/genero/'; }

    function updateServerUI() {
        var btns = document.querySelectorAll('.server-option');
        btns.forEach(function(b) { b.classList.toggle('active', b.dataset.server === currentServer); });
        var indicator = document.getElementById('server-indicator');
        if (currentServer === 's2') { indicator.textContent = 'S2'; indicator.title = 'Animes Online'; }
        else { indicator.textContent = 'S1'; indicator.title = 'AnimeFire'; }
    }

    document.querySelectorAll('.server-option').forEach(function(btn) {
        btn.addEventListener('click', function() {
            var newServer = btn.dataset.server;
            if (newServer === currentServer) return;
            currentServer = newServer;
            localStorage.setItem(LS_SERVER, currentServer);
            updateServerUI();
            closeDrawer();
            renderMain(activeTab);
        });
    });
    updateServerUI();

    var featuredSlug = '';
    var activeTab = 'home';
    var scraperPage = 1, scraperLegendadosPage = 1, scraperLancamentosPage = 1, scraperCatPage = 1;
    var selectedGenero = '', selectedGeneroNome = '';
    var currentTabData = [], currentTabTag = '';

    var main = document.getElementById('main-content');
    var loadingEl = document.getElementById('loading');
    var heroBg = document.getElementById('hero-bg');
    var heroSection = document.getElementById('hero-section');
    var featuredPoster = document.getElementById('featured-poster');
    var featuredTitle = document.getElementById('featured-title');
    var playFeaturedBtn = document.getElementById('play-featured');
    var searchBox = document.getElementById('search-box');
    var searchInput = document.getElementById('search-input');
    var openSearchBtn = document.getElementById('open-search');
    var drawer = document.getElementById('drawer');
    var drawerOverlay = document.getElementById('drawer-overlay');
    var openDrawerBtn = document.getElementById('open-drawer');
    var drawerCloseBtn = document.getElementById('drawer-close');

    var scraperPagination = document.getElementById('scraper-pagination');
    var prevBtn = document.getElementById('prev-btn');
    var nextBtn = document.getElementById('next-btn');
    var pageDisplay = document.getElementById('page-display');
    var scraperLegendadosPagination = document.getElementById('scraper-legendados-pagination');
    var prevBtnLeg = document.getElementById('prev-btn-leg');
    var nextBtnLeg = document.getElementById('next-btn-leg');
    var pageDisplayLeg = document.getElementById('page-display-leg');
    var scraperLancamentosPagination = document.getElementById('scraper-lancamentos-pagination');
    var prevBtnLanc = document.getElementById('prev-btn-lanc');
    var nextBtnLanc = document.getElementById('next-btn-lanc');
    var pageDisplayLanc = document.getElementById('page-display-lanc');
    var scraperCatPagination = document.getElementById('scraper-cat-pagination');
    var prevBtnCat = document.getElementById('prev-btn-cat');
    var nextBtnCat = document.getElementById('next-btn-cat');
    var pageDisplayCat = document.getElementById('page-display-cat');

    function openDrawer() { drawer.classList.add('open'); drawerOverlay.classList.add('open'); }
    function closeDrawer() { drawer.classList.remove('open'); drawerOverlay.classList.remove('open'); }
    openDrawerBtn.addEventListener('click', openDrawer);
    drawerOverlay.addEventListener('click', closeDrawer);
    drawerCloseBtn.addEventListener('click', closeDrawer);

    function hideAllPaginations() {
        scraperPagination.classList.add('hidden');
        scraperLegendadosPagination.classList.add('hidden');
        scraperLancamentosPagination.classList.add('hidden');
        scraperCatPagination.classList.add('hidden');
    }

    var fallbackImg = "data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22140%22><rect fill=%22%23222%22 width=%22100%22 height=%22140%22/><text x=%2250%22 y=%2270%22 text-anchor=%22middle%22 fill=%22%23555%22 font-size=%2212%22>Sem capa</text></svg>";

    function irParaDetalhes(slug) { window.location.href = 'detalhes.html?anime=' + encodeURIComponent(slug); }

    function renderScraperCards(data, tagLabel) {
        var listDiv = document.createElement('div');
        listDiv.className = 'scraper-list';
        data.forEach(function(anime) {
            var card = document.createElement('div');
            card.className = 'premium-card';
            card.addEventListener('click', function(){ irParaDetalhes(anime.slug || ''); });
            card.innerHTML =
                '<div class="poster-container"><img src="' + (anime.capa || '') + '" loading="lazy" alt="' + (anime.titulo || '') + '" onerror="this.src=\'' + fallbackImg + '\'"></div>' +
                '<div class="details"><span class="tag-status">' + tagLabel + '</span><div class="title-anime">' + (anime.titulo || 'Sem título') + '</div><button class="btn-assistir">▶ Assistir</button></div>';
            listDiv.appendChild(card);
        });
        return listDiv;
    }

    function createScraperScrollSection(title, data) {
        if (!data || data.length === 0) return null;
        var section = document.createElement('section');
        section.className = 'anime-section';
        section.innerHTML = '<div class="section-header"><div class="section-bar"></div><h3 class="section-title">' + title + '</h3></div>';
        var sc = document.createElement('div');
        sc.className = 'scraper-scroll';
        data.forEach(function(anime) {
            var card = document.createElement('div');
            card.className = 'scraper-card-mini';
            card.addEventListener('click', function(){ irParaDetalhes(anime.slug || ''); });
            card.innerHTML = '<img src="' + (anime.capa || '') + '" loading="lazy" alt="' + (anime.titulo || '') + '" onerror="this.src=\'' + fallbackImg + '\'">' +
                '<p class="card-title">' + (anime.titulo || 'Sem título') + '</p>';
            sc.appendChild(card);
        });
        section.appendChild(sc);
        return section;
    }

    function showScraperError() {
        var serverName = currentServer === 's2' ? 'Animes Online' : 'AnimeFire';
        main.innerHTML = '<div class="no-results" style="color:#ef4444;">Erro ao conectar com o servidor (' + serverName + ').<br><span style="font-size:12px;color:#555;">Verifique se o servidor local está rodando na porta 3000.</span></div>';
    }

    async function carregarDublados(pg) {
        main.innerHTML = '<div class="loading">Sincronizando catálogo dublado...</div>';
        hideAllPaginations();
        scraperPagination.classList.remove('hidden');
        try {
            var resp = await fetch(SCRAPER_URL() + '?page=' + pg);
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            var data = await resp.json();
            currentTabData = data || [];
            currentTabTag = 'Dublado • Novo Ep';
            main.innerHTML = '';
            if (!data || data.length === 0) { main.innerHTML += '<div class="no-results">Nenhum anime dublado nesta página.</div>'; return; }
            main.appendChild(renderScraperCards(data, 'Dublado • Novo Ep'));
            pageDisplay.textContent = pg;
            prevBtn.disabled = (pg <= 1);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } catch (err) { console.error(err); showScraperError(); }
    }
    prevBtn.addEventListener('click', function() { scraperPage--; if (scraperPage < 1) scraperPage = 1; carregarDublados(scraperPage); });
    nextBtn.addEventListener('click', function() { scraperPage++; carregarDublados(scraperPage); });

    async function carregarLegendados(pg) {
        main.innerHTML = '<div class="loading">Sincronizando catálogo legendado...</div>';
        hideAllPaginations();
        scraperLegendadosPagination.classList.remove('hidden');
        try {
            var resp = await fetch(SCRAPER_LEGENDADOS_URL() + '?page=' + pg);
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            var data = await resp.json();
            currentTabData = data || [];
            currentTabTag = 'Legendado • Novo Ep';
            main.innerHTML = '';
            if (!data || data.length === 0) { main.innerHTML += '<div class="no-results">Nenhum anime legendado nesta página.</div>'; return; }
            main.appendChild(renderScraperCards(data, 'Legendado • Novo Ep'));
            pageDisplayLeg.textContent = pg;
            prevBtnLeg.disabled = (pg <= 1);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } catch (err) { console.error(err); showScraperError(); }
    }
    prevBtnLeg.addEventListener('click', function() { scraperLegendadosPage--; if (scraperLegendadosPage < 1) scraperLegendadosPage = 1; carregarLegendados(scraperLegendadosPage); });
    nextBtnLeg.addEventListener('click', function() { scraperLegendadosPage++; carregarLegendados(scraperLegendadosPage); });

    async function carregarLancamentos(pg) {
        main.innerHTML = '<div class="loading">Buscando lançamentos...</div>';
        hideAllPaginations();
        scraperLancamentosPagination.classList.remove('hidden');
        try {
            var resp = await fetch(SCRAPER_LANCAMENTOS_URL() + '?page=' + pg);
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            var data = await resp.json();
            currentTabData = data || [];
            currentTabTag = 'Lançamento • Em exibição';
            main.innerHTML = '';
            if (!data || data.length === 0) { main.innerHTML += '<div class="no-results">Nenhum lançamento nesta página.</div>'; return; }
            main.appendChild(renderScraperCards(data, 'Lançamento • Em exibição'));
            pageDisplayLanc.textContent = pg;
            prevBtnLanc.disabled = (pg <= 1);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } catch (err) { console.error(err); showScraperError(); }
    }
    prevBtnLanc.addEventListener('click', function() { scraperLancamentosPage--; if (scraperLancamentosPage < 1) scraperLancamentosPage = 1; carregarLancamentos(scraperLancamentosPage); });
    nextBtnLanc.addEventListener('click', function() { scraperLancamentosPage++; carregarLancamentos(scraperLancamentosPage); });

    async function carregarCategorias() {
        main.innerHTML = '<div class="loading">Carregando categorias...</div>';
        hideAllPaginations();
        currentTabData = [];
        try {
            var resp = await fetch(SCRAPER_CATEGORIAS_URL());
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            var cats = await resp.json();
            main.innerHTML = '';
            var header = document.createElement('div');
            header.className = 'section-header';
            header.innerHTML = '<div class="section-bar"></div><h3 class="section-title">Escolha um Gênero</h3>';
            main.appendChild(header);
            var grid = document.createElement('div');
            grid.className = 'cat-grid';
            cats.forEach(function(cat) {
                var chip = document.createElement('div');
                chip.className = 'cat-chip';
                chip.innerHTML = '<span class="cat-chip-name">' + cat.nome + '</span>';
                chip.addEventListener('click', function() {
                    selectedGenero = cat.slug;
                    selectedGeneroNome = cat.nome;
                    scraperCatPage = 1;
                    carregarGenero(cat.slug, 1, cat.nome);
                });
                grid.appendChild(chip);
            });
            main.appendChild(grid);
        } catch (err) { console.error(err); showScraperError(); }
    }

    async function carregarGenero(slug, pg, nomeGenero) {
        main.innerHTML = '<div class="loading">Buscando animes de ' + (nomeGenero || slug) + '...</div>';
        hideAllPaginations();
        scraperCatPagination.classList.remove('hidden');
        try {
            var resp = await fetch(SCRAPER_GENERO_URL() + slug + '?page=' + pg);
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            var data = await resp.json();
            currentTabData = data || [];
            currentTabTag = nomeGenero + ' • Anime';
            main.innerHTML = '';
            var backBtn = document.createElement('button');
            backBtn.className = 'cat-back-btn';
            backBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg> Voltar às Categorias';
            backBtn.addEventListener('click', function() { carregarCategorias(); });
            main.appendChild(backBtn);
            var header = document.createElement('div');
            header.className = 'section-header';
            header.innerHTML = '<div class="section-bar"></div><h3 class="section-title">' + (nomeGenero || slug) + '</h3>';
            main.appendChild(header);
            if (!data || data.length === 0) { main.innerHTML += '<div class="no-results">Nenhum anime encontrado neste gênero.</div>'; return; }
            main.appendChild(renderScraperCards(data, nomeGenero + ' • Anime'));
            pageDisplayCat.textContent = pg;
            prevBtnCat.disabled = (pg <= 1);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } catch (err) { console.error(err); showScraperError(); }
    }
    prevBtnCat.addEventListener('click', function() { scraperCatPage--; if (scraperCatPage < 1) scraperCatPage = 1; carregarGenero(selectedGenero, scraperCatPage, selectedGeneroNome); });
    nextBtnCat.addEventListener('click', function() { scraperCatPage++; carregarGenero(selectedGenero, scraperCatPage, selectedGeneroNome); });

    var navItems = document.querySelectorAll('.drawer-nav-item');

    async function fetchScraperForHome() {
        var results = { dublados: [], legendados: [], lancamentos: [], shounen: [], romance: [], acao: [], fantasia: [] };
        try {
            var [dubRes, legRes, lancRes, shounenRes, romanceRes, acaoRes, fantasiaRes] = await Promise.allSettled([
                fetch(SCRAPER_URL() + '?page=1').then(function(r){ return r.ok ? r.json() : []; }),
                fetch(SCRAPER_LEGENDADOS_URL() + '?page=1').then(function(r){ return r.ok ? r.json() : []; }),
                fetch(SCRAPER_LANCAMENTOS_URL() + '?page=1').then(function(r){ return r.ok ? r.json() : []; }),
                fetch(SCRAPER_GENERO_URL() + 'shounen?page=1').then(function(r){ return r.ok ? r.json() : []; }),
                fetch(SCRAPER_GENERO_URL() + 'romance?page=1').then(function(r){ return r.ok ? r.json() : []; }),
                fetch(SCRAPER_GENERO_URL() + 'acao?page=1').then(function(r){ return r.ok ? r.json() : []; }),
                fetch(SCRAPER_GENERO_URL() + 'fantasia?page=1').then(function(r){ return r.ok ? r.json() : []; })
            ]);
            if (dubRes.status === 'fulfilled') results.dublados = dubRes.value || [];
            if (legRes.status === 'fulfilled') results.legendados = legRes.value || [];
            if (lancRes.status === 'fulfilled') results.lancamentos = lancRes.value || [];
            if (shounenRes.status === 'fulfilled') results.shounen = shounenRes.value || [];
            if (romanceRes.status === 'fulfilled') results.romance = romanceRes.value || [];
            if (acaoRes.status === 'fulfilled') results.acao = acaoRes.value || [];
            if (fantasiaRes.status === 'fulfilled') results.fantasia = fantasiaRes.value || [];
        } catch(e) { console.error('Scraper home error:', e); }
        return results;
    }

    function setFeaturedFromScraper(animeList) {
        if (!animeList || animeList.length === 0) return;
        var rand = animeList[Math.floor(Math.random() * Math.min(animeList.length, 5))];
        featuredSlug = rand.slug || '';
        heroBg.style.backgroundImage = "url('" + (rand.capa || '') + "')";
        featuredPoster.style.backgroundImage = "url('" + (rand.capa || '') + "')";
        featuredTitle.textContent = rand.titulo || 'Sem título';
    }

    async function renderMain(tab) {
        activeTab = tab || 'home';
        main.innerHTML = '';
        currentTabData = [];
        navItems.forEach(function(n) { n.classList.toggle('active', n.dataset.tab === activeTab); });
        heroSection.style.display = (activeTab === 'home') ? '' : 'none';
        hideAllPaginations();

        if (activeTab === 'home') {
            loadingEl.style.display = '';
            loadingEl.textContent = 'Carregando do servidor scraper...';

            var scraperData = await fetchScraperForHome();
            loadingEl.style.display = 'none';

            /* Set featured hero from lancamentos or dublados */
            var heroPool = (scraperData.lancamentos.length > 0) ? scraperData.lancamentos : scraperData.dublados;
            setFeaturedFromScraper(heroPool);

            var sLanc = createScraperScrollSection(' Lançamentos', scraperData.lancamentos.slice(0, 20));
            var sDub = createScraperScrollSection(' Dublados Recentes', scraperData.dublados.slice(0, 20));
            var sLeg = createScraperScrollSection(' Legendados Recentes', scraperData.legendados.slice(0, 20));
            var sShounen = createScraperScrollSection(' Shounen', scraperData.shounen.slice(0, 15));
            var sAcao = createScraperScrollSection(' Ação', scraperData.acao.slice(0, 15));
            var sFantasia = createScraperScrollSection(' Fantasia', scraperData.fantasia.slice(0, 15));
            var sRomance = createScraperScrollSection(' Romance', scraperData.romance.slice(0, 15));
            [sLanc, sDub, sLeg, sShounen, sAcao, sFantasia, sRomance].forEach(function(s) { if (s) main.appendChild(s); });

            if (main.children.length === 0) {
                main.innerHTML = '<div class="no-results">Não foi possível carregar dados. Verifique se o servidor está rodando.</div>';
            }

        } else if (activeTab === 'dublados') {
            scraperPage = 1; carregarDublados(scraperPage);
        } else if (activeTab === 'legendados') {
            scraperLegendadosPage = 1; carregarLegendados(scraperLegendadosPage);
        } else if (activeTab === 'lancamentos') {
            scraperLancamentosPage = 1; carregarLancamentos(scraperLancamentosPage);
        } else if (activeTab === 'categoria') {
            carregarCategorias();
        } else if (activeTab === 'perfil') {
            main.innerHTML = '<section class="anime-section"><div class="section-header"><div class="section-bar"></div><h3 class="section-title">Perfil</h3></div><div class="profile-card"><p class="profile-info">Usuário: <strong>CONVIDADO</strong></p><p class="profile-info">Servidor: <strong>' + (currentServer === 's2' ? 'Animes Online (S2)' : 'AnimeFire (S1)') + '</strong></p></div></section>';
        }
    }

    renderMain('home');

    playFeaturedBtn.addEventListener('click', function() { if (featuredSlug) irParaDetalhes(featuredSlug); });

    navItems.forEach(function(btn) {
        btn.addEventListener('click', function() {
            renderMain(btn.dataset.tab);
            closeDrawer();
            searchBox.classList.remove('show');
            searchInput.value = '';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    });

    openSearchBtn.addEventListener('click', function() {
        searchBox.classList.toggle('show');
        if (searchBox.classList.contains('show')) { searchInput.focus(); searchInput.value = ''; }
        else {
            if (currentTabData.length > 0) { main.innerHTML = ''; main.appendChild(renderScraperCards(currentTabData, currentTabTag)); }
        }
    });

    function SCRAPER_PESQUISAR_URL() { return API_BASE + getApiPrefix() + '/pesquisar'; }

    function getSearchScopeParams() {
        if (activeTab === 'dublados') return 'scope=dublados&pages=18';
        if (activeTab === 'legendados') return 'scope=legendados&pages=18';
        if (activeTab === 'lancamentos') return 'scope=lancamentos&pages=8';
        if (activeTab === 'categoria' && selectedGenero) return 'scope=genero&genero=' + encodeURIComponent(selectedGenero) + '&pages=12';
        return 'scope=all&pages=12';
    }

    function getSearchTitle() {
        if (activeTab === 'dublados') return 'Resultados em Dublados';
        if (activeTab === 'legendados') return 'Resultados em Legendados';
        if (activeTab === 'lancamentos') return 'Resultados em Lançamentos';
        if (activeTab === 'categoria' && selectedGeneroNome) return 'Resultados em ' + selectedGeneroNome;
        return 'Resultados gerais';
    }

    var searchTimeout = null;
    var searchRequestId = 0;
    searchInput.addEventListener('input', function(e) {
        clearTimeout(searchTimeout);
        var q = (e.target.value || '').trim();
        searchTimeout = setTimeout(async function() {
            if (!q) {
                searchRequestId++;
                hideAllPaginations();
                if (activeTab === 'home') renderMain('home');
                else if (activeTab === 'dublados') carregarDublados(scraperPage);
                else if (activeTab === 'legendados') carregarLegendados(scraperLegendadosPage);
                else if (activeTab === 'lancamentos') carregarLancamentos(scraperLancamentosPage);
                else if (activeTab === 'categoria' && selectedGenero) carregarGenero(selectedGenero, scraperCatPage, selectedGeneroNome);
                else if (activeTab === 'categoria') carregarCategorias();
                else if (currentTabData.length > 0) { main.innerHTML = ''; main.appendChild(renderScraperCards(currentTabData, currentTabTag)); }
                return;
            }

            var requestId = ++searchRequestId;
            var baseTitle = getSearchTitle();
            main.innerHTML = '<div class="loading">Pesquisando "' + q + '" em ' + baseTitle.toLowerCase() + '...</div>';
            hideAllPaginations();
            heroSection.style.display = 'none';

            try {
                var query = 'q=' + encodeURIComponent(q) + '&' + getSearchScopeParams();
                var resp = await fetch(SCRAPER_PESQUISAR_URL() + '?' + query);
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                var data = await resp.json();
                if (requestId !== searchRequestId) return;

                main.innerHTML = '';
                if (!data || data.length === 0) {
                    main.innerHTML = '<div class="no-results">Nenhum resultado para "' + q + '"</div>';
                } else {
                    var header = document.createElement('div');
                    header.className = 'section-header';
                    header.innerHTML = '<div class="section-bar"></div><h3 class="section-title">' + baseTitle + ' para "' + q + '" (' + data.length + ')</h3>';
                    main.appendChild(header);
                    main.appendChild(renderScraperCards(data, 'Pesquisa'));
                }
            } catch(err) {
                console.error(err);
                if (requestId === searchRequestId) {
                    main.innerHTML = '<div class="no-results" style="color:#ef4444;">Erro ao pesquisar no servidor atual.</div>';
                }
            }
        }, 600);
    });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            if (searchBox.classList.contains('show')) { searchBox.classList.remove('show'); searchInput.value = ''; }
            if (drawer.classList.contains('open')) closeDrawer();
        }
    });
    </script>

<script>
(function(){
    var WELCOME_KEY = 'draksyon_welcome_seen';
    if(localStorage.getItem(WELCOME_KEY)){
        var el = document.getElementById('welcome-overlay');
        if(el) el.remove();
        return;
    }

    var steps = [
        { title: 'Bem-vindo ao DRAKSYON! ', desc: 'Seu portal definitivo para explorar, descobrir e assistir os melhores animes legendados e dublados.' },
        { title: 'Catálogo Completo ', desc: 'Navegue por milhares de títulos, filtre por gênero, acompanhe lançamentos e encontre sua próxima série favorita.' },
        { title: 'Pronto para Começar? ', desc: 'Mergulhe nesse universo incrível. Sua jornada anime começa agora!' }
    ];
    var current = 0;
    var overlay = document.getElementById('welcome-overlay');
    var titleEl = document.getElementById('welcome-title');
    var descEl = document.getElementById('welcome-desc');
    var nextBtn = document.getElementById('welcome-next');
    var skipBtn = document.getElementById('welcome-skip');
    var dotsEl = document.getElementById('welcome-dots');

    function renderStep(){
        titleEl.className = 'welcome-title';
        descEl.className = 'welcome-desc';
        void titleEl.offsetWidth;
        titleEl.textContent = steps[current].title;
        descEl.textContent = steps[current].desc;
        titleEl.className = 'welcome-title welcome-animate';
        descEl.className = 'welcome-desc welcome-animate';
        nextBtn.textContent = current < steps.length - 1 ? 'Próximo' : 'Começar!';
        skipBtn.style.display = current < steps.length - 1 ? '' : 'none';
        dotsEl.innerHTML = '';
        for(var i=0;i<steps.length;i++){
            var d = document.createElement('div');
            d.className = 'welcome-dot ' + (i===current?'active':i<current?'done':'pending');
            dotsEl.appendChild(d);
        }
    }

    function dismiss(){
        localStorage.setItem(WELCOME_KEY, '1');
        overlay.classList.add('hiding');
        setTimeout(function(){ overlay.remove(); }, 500);
    }

    nextBtn.addEventListener('click', function(){
        if(current < steps.length - 1){ current++; renderStep(); }
        else dismiss();
    });
    skipBtn.addEventListener('click', dismiss);

    renderStep();
})();
</script>
